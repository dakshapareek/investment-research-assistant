<!DOCTYPE html>
<html>
<head>
    <title>Test News Response</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .headline {
            padding: 15px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .headline a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 16px;
        }
        .headline a:hover {
            text-decoration: underline;
        }
        .meta {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Test News Headlines Response</h1>
    <button onclick="testNews()">Fetch AAPL News</button>
    
    <div id="results"></div>
    
    <script>
        async function testNews() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/analyze/AAPL');
                const data = await response.json();
                
                console.log('Full response:', data);
                
                const headlines = data.news_summary?.headlines || [];
                
                let html = '<h2>Headlines Structure:</h2>';
                html += `<p>Total headlines: ${headlines.length}</p>`;
                
                html += '<h3>Raw JSON:</h3>';
                html += '<pre>' + JSON.stringify(headlines, null, 2) + '</pre>';
                
                html += '<h3>Rendered Headlines:</h3>';
                
                headlines.forEach((headline, idx) => {
                    html += '<div class="headline">';
                    
                    if (typeof headline === 'object' && headline !== null) {
                        const url = headline.url || '#';
                        const title = headline.title || 'No title';
                        
                        html += `<a href="${url}" target="_blank">${title}</a>`;
                        html += '<div class="meta">';
                        if (headline.source) html += `Source: ${headline.source} | `;
                        if (headline.date) html += `Date: ${headline.date}`;
                        html += '</div>';
                    } else {
                        html += `<p>${headline}</p>`;
                    }
                    
                    html += '</div>';
                });
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
